name: ci

# Pipeline de qualidade do Orion Harness (AGENTS.md §8, §3 gate G3).
# Stack única Node/TypeScript (ADR-0005/ADR-0012). Outras linguagens = templates futuros/externos.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    name: lint-test-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # ---- Node / TypeScript (stack única — ADR-0005/ADR-0012) ----
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
      - name: Node — install / lint / test / build
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run lint --if-present
          npm run typecheck --if-present
          npm test --if-present
          npm run build --if-present

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # Binário do gitleaks direto: sem dependência de GITLEAKS_LICENSE (válido em
      # qualquer tipo de repositório, inclusive sob organização).
      - name: Instalar gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Rodar gitleaks
        run: gitleaks detect --source . --redact --verbose

  smoke-test:
    name: smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
      # ADR-0020: a camada estática do smoke-test usa o parser js-yaml → requer node_modules.
      - name: Instalar dependências (js-yaml p/ a camada estática)
        run: npm ci
      - uses: actions/setup-python@v7
        with:
          python-version: "3.x"
      - name: Instalar ferramentas de validação
        # pyyaml removido (#75): o smoke-test não usa mais python p/ YAML (parser js-yaml em Node, ADR-0020).
        # O `pre-commit` (binário externo, §5 fora de escopo) permanece p/ o check de hook real da Seção 2.
        run: |
          python -m pip install --upgrade pip pre-commit
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Autovalidação do harness
        run: bash scripts/smoke-test.sh

  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v7
        with:
          python-version: "3.x"
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
      - name: Cache do pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Instalar pre-commit
        run: python -m pip install --upgrade pip pre-commit
      # Hooks de arquivo (estágio pre-commit). O hook commitlint é de estágio
      # commit-msg e, por isso, não roda aqui — é validado no passo seguinte.
      - name: Hooks de arquivo
        run: pre-commit run --all-files --show-diff-on-failure
      # Conventional Commits sobre o range do PR (não via --all-files).
      - name: Conventional Commits (range do PR)
        if: github.event_name == 'pull_request'
        run: |
          npx --yes -p @commitlint/cli -p @commitlint/config-conventional \
            commitlint --config commitlint.config.js \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to "${{ github.event.pull_request.head.sha }}"
